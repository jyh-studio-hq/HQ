<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="author" content="JEN-YUAN HSUEH ARCHITECTS">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作進度表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="schedule.css">
<link rel="stylesheet" href="print.css" media="print">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="page-hdr">
    <div>
      <div class="title-area">
        <input id="projectTitle" type="text" value="專案名稱　工作進度表 v1" title="點擊編輯標題" oninput="autoSave()">
        <span style="font-size:11px;color:var(--text3);white-space:nowrap; font-weight:700;">製表日期：</span>
        <input id="docDate" type="text" value="" placeholder="例：2026.03.24" title="點擊編輯製表日期" oninput="autoSave()">
      </div>
      <p class="sub" id="subLine"></p>
    </div>
    <div class="hdr-btns no-print">
      <button class="btn" onclick="window.location.href='index.html'">⌂ 回到首頁</button>
      <button class="btn" onclick="togglePanel('cfgPanel')">⚙ 年份/月份</button>
      <button class="btn" onclick="openGrpMgr()">▤ 管理群組</button>
      <button class="btn" onclick="openAdd()">＋ 新增任務</button>
      <button class="btn" id="btnToggleDeps" onclick="toggleDeps()" title="顯示/隱藏任務關聯箭頭">⇌ 關聯線</button>
      <button class="btn btn-amber" onclick="togglePanel('printPanel')">🖨 列印輸出</button>
      <button class="btn" onclick="exportJSON()" title="將目前所有資料儲存為 JSON 檔">⬇ 儲存</button>
      <button class="btn" onclick="document.getElementById('importFile').click()" title="載入先前儲存的 JSON 檔">⬆ 載入</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      <button class="btn btn-red" onclick="clearStorage()" title="清除瀏覽器暫存的進度表資料">⊘ 清除暫存</button>
    </div>
  </div>

  <div class="panel no-print" id="cfgPanel">
    <div class="panel-title">年份與月份設定</div>
    <div class="panel-row">
      <label>起始年份：</label>
      <input type="number" id="cfgStartYear" value="2026" min="2020" max="2050" style="width:70px" oninput="rebuildAxis()">
      <label style="margin-left:12px">顯示年數：</label>
      <input type="number" id="cfgYears" value="3" min="1" max="10" style="width:55px" oninput="rebuildAxis()">
      <span style="font-size:11px;color:var(--text3); font-family: var(--font-mono);" id="cfgAxisLabel"></span>
    </div>
    <div class="panel-title" style="margin-top:1rem; border-top: 1px dashed var(--border); padding-top: 1rem;">隱藏月份（點擊切換；隱藏的月份不列印）</div>
    <div id="monGridWrap"></div>
  </div>

  <div class="panel no-print" id="printPanel">
    <div class="panel-title">步驟 1　設定列印範圍</div>
    <div class="pr-step">
      <label>從</label><select id="prSY"></select><label>年</label><select id="prSM"></select><label>月</label>
      <span style="color:var(--text3);font-size:14px">─</span>
      <label>到</label><select id="prEY"></select><label>年</label><select id="prEM"></select><label>月</label>
      <button class="btn btn-blue" onclick="applyPrintRange()" style="margin-left:4px">套用範圍</button>
      <button class="btn" onclick="cancelPrintRange()" style="margin-left:4px">復原 / 顯示全部</button>
    </div>
    <div class="pr-preview" id="prPreview"></div>
    <div class="panel-title" style="margin-top:1rem; border-top: 1px dashed var(--border); padding-top: 1rem;">步驟 2　選擇輸出格式</div>
    <div class="pr-actions">
      <button class="btn" onclick="doPrint()">⬇ 輸出 PDF（列印）</button>
      <button class="btn" onclick="exportExcel()">⬇ 輸出 Excel</button>
    </div>
  </div>

  <div class="toolbar no-print">
    <div class="tb-row">
      <label>篩選群組：</label><div id="fgWrap" style="display:flex; gap:4px; flex-wrap:wrap;"></div>
    </div>
    <div class="tb-row">
      <label>任務狀態：</label>
      <div style="display:flex; gap:4px; flex-wrap:wrap;">
         <button class="f-tag" id="fs_done" onclick="toggleFs('done')">已完成</button>
         <button class="f-tag" id="fs_active" onclick="toggleFs('active')">進行中</button>
         <button class="f-tag" id="fs_pending" onclick="toggleFs('pending')">待辦</button>
      </div>
    </div>
    <div class="tb-row">
      <label>負責單位：</label>
      <input type="text" id="fo" placeholder="輸入關鍵字..." oninput="render()" style="width:120px">
    </div>
  </div>

  <div class="legend" style="margin-bottom:8px">
    <span style="font-size:11px;font-weight:700;color:var(--yr-tx); letter-spacing: 0.05em;">圖例：</span>
    <div class="leg"><div class="leg-sq" style="background:var(--done-bg);border-color:var(--done-br)"></div>已完成</div>
    <div class="leg"><div class="leg-sq" style="background:var(--active-bg);border-color:var(--active-br)"></div>進行中</div>
    <div class="leg"><div class="leg-sq" style="background:var(--pend-bg);border-color:var(--pend-br)"></div>待辦</div>
    <div class="leg" style="margin-left: 8px;"><div class="leg-ms" style="-webkit-print-color-adjust:exact;print-color-adjust:exact"></div>里程碑</div>
    <div class="leg"><div class="leg-sq" style="background:transparent;border-color:var(--border-dark);outline:1.5px solid var(--imp-outline);outline-offset:-1.5px; box-shadow: none; -webkit-print-color-adjust:exact;print-color-adjust:exact"></div>重要任務</div>
    <div class="leg"><div class="leg-sq" style="background:var(--lny-bg);border-color:var(--lny-br);box-shadow:none;-webkit-print-color-adjust:exact;print-color-adjust:exact"></div>農曆春節</div>
    <div class="leg"><div class="leg-line" style="background:var(--today);-webkit-print-color-adjust:exact;print-color-adjust:exact"></div>目前時間</div>
    <div class="leg"><svg width="20" height="10" style="margin-right:2px"><path d="M0,5 L5,5 L5,10" fill="none" stroke="#E53E3E" stroke-width="1.0" stroke-dasharray="3,2" marker-end="url(#arrowhead-fs)"/></svg>FS關聯</div>
    <div class="leg"><svg width="20" height="10" style="margin-right:2px"><path d="M0,5 L5,5 L5,10" fill="none" stroke="#63B3ED" stroke-width="1.0" stroke-dasharray="3,2" marker-end="url(#arrowhead-ss)"/></svg>SS關聯</div>
    <div class="leg no-print" style="margin-left:auto;font-size:10px;color:var(--text3);">點擊名稱編輯 / 拖曳調整時程</div>
  </div>

  <div style="position:relative;">
    <div class="gantt-outer" id="go"><table id="gt"></table></div>
    <svg id="depSvg" class="dep-svg-wrap">
      <defs>
        <marker id="arrowhead-fs" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><polygon points="0 0, 5 2.5, 0 5" fill="#E53E3E"/></marker>
        <marker id="arrowhead-ss" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><polygon points="0 0, 5 2.5, 0 5" fill="#63B3ED"/></marker>
      </defs>
    </svg>
  </div>

  <div class="notes-section" id="notesSection">
    <div class="notes-hdr">
      <span>NOTES 說明</span>
      <button class="btn no-print" onclick="addNote()" style="padding:2px 8px;font-size:10px;background:transparent;border-color:#111;color:#111;margin-left:auto">＋ 新增說明</button>
    </div>
    <div class="notes-body" id="notesBody"></div>
    <div class="notes-copy-row">
      <span id="copyText">COPYRIGHT &copy; 2026 JEN-YUAN HSUEH ARCHITECTS │ 薛仁淵建築師事務所 開發</span>
    </div>
  </div>
</div>

<div class="mbg" id="modal">
  <div class="mbox">
    <h3 id="mTitle">編輯任務</h3>
    <div class="field"><label>任務名稱</label><input id="eName" type="text"></div>
    <div class="field"><label>群組</label><select id="eGrp"></select></div>
    <div class="field"><label>負責單位</label><input id="eUnit" type="text" placeholder="例：設計部、法務、工務"></div>
    <div class="field"><label>狀態</label>
      <select id="eSt"><option value="done">已完成</option><option value="active">進行中</option><option value="pending">待辦</option></select>
    </div>
    <div class="row2">
      <div class="field"><label>開始日期</label><input id="eDateS" type="date" oninput="dateToWk()"></div>
      <div class="field"><label>結束日期</label><input id="eDateE" type="date" oninput="dateToWk()"></div>
    </div>
    <div class="date-hint" id="dateHint"></div>
    <div class="field"><label>類型</label>
      <select id="eMi"><option value="0">一般任務</option><option value="1">里程碑</option><option value="2">重要任務</option></select>
    </div>
    <div class="field" style="border-top:1px dashed var(--border-dark); padding-top:10px; margin-top:10px;">
      <label>前置任務關聯 (自動畫線)</label>
      <div style="display:flex;gap:6px;margin-bottom:4px">
        <select id="depSelTask" style="flex:1;font-size:11px"></select>
        <select id="depSelType" style="width:70px;font-size:11px"><option value="FS">結束-開始 (FS)</option><option value="SS">同步開始 (SS)</option></select>
        <button class="btn" onclick="addDep()" style="padding:3px 8px;font-size:11px">＋</button>
      </div>
      <div class="dep-list" id="depList" style="margin-bottom: 6px;"></div>
    </div>
    <div class="mact">
      <button class="btn btn-red" id="btnDel" onclick="delTask()" style="margin-right:auto">刪除</button>
      <button class="btn" onclick="closeMod()">取消</button>
      <button class="btn btn-blue" onclick="saveTask()">儲存</button>
    </div>
  </div>
</div>

<div class="mbg" id="grpModal">
  <div class="mbox wide">
    <h3>管理群組</h3>
    <div class="grp-list" id="grpList"></div>
    <div style="padding:10px 8px 6px;font-size:11px;color:var(--text2);font-weight:700;letter-spacing:0.05em;">新增群組</div>
    <div class="gadd-row">
      <input type="text" id="newGrpName" placeholder="輸入群組名稱...">
      <div id="newGrpSwatch" style="width:18px;height:18px;border:1px solid #111;flex-shrink:0;background:#2C5282"></div>
      <select id="newGrpColor" style="width:110px" onchange="document.getElementById('newGrpSwatch').style.background=this.value"></select>
      <button class="btn btn-blue" onclick="addGrp()">＋ 新增</button>
    </div>
    <div class="mact">
      <button class="btn" onclick="cancelGrpMgr()">取消</button>
      <button class="btn btn-blue" onclick="closeGrpMgr()">完成</button>
    </div>
  </div>
</div>

<script src="storage.js"></script>
<script src="schedule-render.js"></script>
<script src="schedule-deps.js"></script>
<script src="schedule-actions.js"></script>

<script>
window.onload = () => {
  initStorage();   // 1. 從 storage.js 載入儲存資料
  syncGrpSel();    // 2. 更新群組選單
  rebuildAxis();   // 3. 建立時間軸
  renderNotes();   // 4. 繪製說明區塊
  render();        // 5. 繪製甘特圖
};
</script>
</body>
</html>
